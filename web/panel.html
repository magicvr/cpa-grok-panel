<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Grok 账号面板</title>
  <style>
    :root{color-scheme:dark;--bg:#0b1020;--card:#151c31;--line:#293450;--text:#eaf0ff;--muted:#98a6c7;--accent:#70d7ff;--good:#69e6a6;--bad:#ff8b9b}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#0b1020,#111932);color:var(--text);font:14px/1.5 system-ui,sans-serif}.wrap{max-width:1180px;margin:auto;padding:28px 18px}header{display:flex;justify-content:space-between;align-items:center;gap:16px}h1{margin:0;font-size:26px}.sub{color:var(--muted);margin-top:4px}button{border:0;border-radius:9px;padding:9px 16px;background:var(--accent);color:#07111c;font-weight:700;cursor:pointer}button:disabled{opacity:.55;cursor:wait}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px}.label{color:var(--muted);font-size:12px}.value{font-size:22px;font-weight:750;margin-top:4px}.panel{overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;min-width:880px}th,td{text-align:left;padding:11px 13px;border-bottom:1px solid var(--line)}th{color:var(--muted);font-size:12px}.ok{color:var(--good)}.bad{color:var(--bad)}.file{max-width:270px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.notice{margin:12px 0;color:var(--muted)}@media(max-width:760px){.cards{grid-template-columns:repeat(2,1fr)}header{align-items:flex-start}}
  </style>
</head>
<body><main class="wrap">
  <header><div><h1>Grok 账号面板</h1><div class="sub">CPA xAI OAuth 账号 · M1 只读模式</div></div><button id="refresh">刷新</button></header>
  <section class="cards"><div class="card"><div class="label">账号数</div><div id="accounts" class="value">—</div></div><div class="card"><div class="label">成功请求</div><div id="success" class="value">—</div></div><div class="card"><div class="label">失败请求</div><div id="failed" class="value">—</div></div><div class="card"><div class="label">累计 Token</div><div id="tokens" class="value">—</div></div></section>
  <div id="notice" class="notice">正在读取数据…</div>
  <section class="panel"><table><thead><tr><th>账号文件</th><th>状态</th><th>优先级</th><th>输入 Token</th><th>输出 Token</th><th>总 Token</th><th>成功 / 失败</th><th>去重</th></tr></thead><tbody id="rows"></tbody></table></section>
</main><script>
const base='/plugins/cpa-grok-panel/api/v1';const fmt=n=>new Intl.NumberFormat('zh-CN').format(n||0);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function refresh(){const btn=document.querySelector('#refresh');btn.disabled=true;document.querySelector('#notice').textContent='正在刷新…';try{const [metaRes,accountsRes]=await Promise.all([fetch(base+'/meta',{cache:'no-store'}),fetch(base+'/accounts',{cache:'no-store'})]);if(!metaRes.ok||!accountsRes.ok)throw new Error('接口返回异常');const meta=await metaRes.json(),data=await accountsRes.json(),items=data.items||[];const sum=items.reduce((a,x)=>{a.s+=(x.usage.successful_requests||0);a.f+=(x.usage.failed_requests||0);a.t+=(x.usage.total_tokens||0);return a},{s:0,f:0,t:0});document.querySelector('#accounts').textContent=fmt(items.length);document.querySelector('#success').textContent=fmt(sum.s);document.querySelector('#failed').textContent=fmt(sum.f);document.querySelector('#tokens').textContent=fmt(sum.t);document.querySelector('#rows').innerHTML=items.map(x=>`<tr><td class="file" title="${esc(x.exact_file_name)}">${esc(x.exact_file_name)}</td><td class="${x.enabled?'ok':'bad'}">${x.enabled?'启用':'停用'}${x.unavailable?' / 不可用':''}</td><td>${x.priority}</td><td>${fmt(x.usage.input_tokens)}</td><td>${fmt(x.usage.output_tokens)}</td><td>${fmt(x.usage.total_tokens)}</td><td>${fmt(x.usage.successful_requests)} / ${fmt(x.usage.failed_requests)}</td><td>${esc(x.usage.dedupe_mode||meta.dedupe_mode)}</td></tr>`).join('');document.querySelector('#notice').textContent=`统计起点：${new Date(meta.statistics_started_at).toLocaleString()} · 全局去重：${meta.dedupe_mode} · write_mode=${meta.write_mode}`;}catch(e){document.querySelector('#notice').textContent='刷新失败：'+e.message;}finally{btn.disabled=false}}
document.querySelector('#refresh').addEventListener('click',refresh);refresh();
</script></body></html>
